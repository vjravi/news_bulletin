ollama:
  model: "qwen3.5:9b-mlx-bf16"
  base_url: "http://localhost:11434"

sources:
  hackernews:
    enabled: true
    max_items: 20
  reddit:
    enabled: true
    subreddits:
      - "LocalLLaMA"
    max_items: 15
  tldr:
    enabled: true
  papers:
    enabled: true
    filter: "date"  # date | week | month

storage:
  data_dir: "./data"
  retention_days: 30

output:
  html_path: "./output/bulletin.html"

scheduler:
  enabled: true
  daily_at: "07:00"
  timezone: "America/Los_Angeles"

recommender:
  enabled: true
  max_concurrent: 3
  score_model: null   # null => reuse ollama.model
