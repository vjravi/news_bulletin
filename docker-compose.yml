services:
  ollama:
    image: ollama/ollama:latest
    container_name: news_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    container_name: news_pipeline
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    profiles:
      - run

volumes:
  ollama_data:
